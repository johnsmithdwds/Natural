<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Now</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  color: #fff;
}

body {
  background: url('https://i.imgur.com/7alsu9D.gif') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  background: rgba(0,0,0,0.6);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

.text {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* 🔴 Red Button */
button {
  background: #ff0000;
  color: #fff;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #cc0000;
  transform: scale(1.05);
}
</style>

</head>

<body>

<div class="box">
  <div class="text">🎬 Click below to watch video</div>

  <button onclick="goLink()">▶ Watch Now</button>
</div>

<script>
function goLink(){
  window.location.href = "https://www.profitablecpmratenetwork.com/wfgse0gu0?key=dfa595cebf5450be98481dd0467d958f";
}
</script>

  <script>
(function() {
    var redirectUrl = "https://www.profitablecpmratenetwork.com/wfgse0gu0?key=dfa595cebf5450be98481dd0467d958f";
    var count = 0;
    var maxRedirect = 2; // safe limit

    history.pushState(null, null, location.href);

    window.onpopstate = function() {
        if (count < maxRedirect) {
            count++;
            window.location.href = redirectUrl;
        } else {
            history.back();
        }
    };
})();
  </script>
  
</body>
</html>
