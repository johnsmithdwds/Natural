<html>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.box{
  margin-top:150px;
}

.progress{
  width:80%;
  height:12px;
  background:#333;
  margin:auto;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#ff3c3c;
}

.text{
  margin-bottom:20px;
  font-size:20px;
}
</style>

</head>

<body>

<div class="box">
  <div class="text">🔄 Unlocking your video... Please wait</div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <p id="percent">0%</p>
</div>

<script>
let width = 0;
let time = 60; // 60 * 100ms = 6 sec

let interval = setInterval(function(){
  width++;
  document.getElementById("bar").style.width = width + "%";
  document.getElementById("percent").innerText = width + "%";

  if(width >= 100){
    clearInterval(interval);

    // 🔥 SMARTLINK REDIRECT
    window.location.href = "https://www.profitablecpmratenetwork.com/wfgse0gu0?key=dfa595cebf5450be98481dd0467d958f";
  }
}, time);
</script>
