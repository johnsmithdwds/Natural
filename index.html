<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Now</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://i.imgur.com/7alsu9D.gif') no-repeat center center fixed;
  background-size:cover;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
  text-align:center;
}

button{
  background:red;
  color:#fff;
  border:none;
  padding:15px 30px;
  font-size:18px;
  border-radius:10px;
  cursor:pointer;
}

/* Popup */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  text-align:center;
}
</style>

</head>

<body>

<!-- Main Watch Box -->
<div class="box">
  <h2>🎬 Click below to watch video</h2>
  <button onclick="goLink()">▶ Watch Now</button>
</div>

<!-- Chrome / Safari popup for in-app browser -->
<div id="chromePopup" class="popup">
  <div class="popup-box">
    <p>⚠ Better experience in Chrome or Safari!</p>
    <button onclick="openChrome()">Open in Chrome</button>
    <button onclick="stayHere()">Stay Here</button>
  </div>
</div>

<!-- Exit popup on back button -->
<div id="exitPopup" class="popup">
  <div class="popup-box">
    <p>⚠ Wait! Video is loading...</p>
    <button onclick="stayHere()">Continue</button>
    <button onclick="leavePage()">Leave</button>
  </div>
</div>

<script>
// Smart links
let smartLink1 = "https://www.profitablecpmratenetwork.com/wfgse0gu0?key=dfa595cebf5450be98481dd0467d958f";
let smartLink2 = "https://www.profitablecpmratenetwork.com/qi7puzt1?key=464fb4582c84f557321f9335262eb375";

// Detect in-app browsers (FB, IG, Messenger)
function isInApp(){
  let ua = navigator.userAgent || navigator.vendor || window.opera;
  return ua.includes("FBAN") || ua.includes("FBAV") || ua.includes("Instagram") || ua.includes("Messenger");
}

// Open two tabs safely
function goLink(){
  window.open(smartLink1, "_blank");
  setTimeout(() => window.open(smartLink2, "_blank"), 100);
}

// Open Chrome (Android intent)
function openChrome(){
  let url = window.location.href;
  window.location.href = "intent://" + url.replace(/^https?:\/\//,'') + "#Intent;scheme=https;package=com.android.chrome;end";
}

// ===== Safe back button system =====
history.pushState(null, null, location.href);

window.addEventListener("popstate", function(){
  document.getElementById("exitPopup").style.display = "flex";
});

function stayHere(){
  document.getElementById("exitPopup").style.display="none";
  document.getElementById("chromePopup").style.display="none";
  history.pushState(null, null, location.href);
}

function leavePage(){
  window.history.back();
}

// ===== Auto show Chrome popup if in-app browser =====
window.addEventListener('load', function(){
  if(isInApp()){
    document.getElementById("chromePopup").style.display = "flex";
  }
});
</script>
  
</body>
</html>
