<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  font-family: Arial, sans-serif;
  color: #fff;
  overflow: hidden;
}

body {
  background: url('https://i.imgur.com/7alsu9D.gif') no-repeat center center fixed;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.box {
  background: rgba(0,0,0,0.5);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

.progress {
  width: 80%;
  height: 15px;
  background: #222;
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(255,255,255,0.3);
}

.bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff3c3c, #ff9f3c, #3cffbd, #3c6eff);
  animation: glow 2s infinite alternate;
  border-radius: 10px;
}

@keyframes glow {
  0% { filter: brightness(1); }
  100% { filter: brightness(1.5); }
}

.text {
  font-size: 22px;
  font-weight: bold;
  text-shadow: 0 0 10px #000;
}
</style>

</head>

<body>

<div class="box">
  <div class="text">🔄 Unlocking your video... Please wait</div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <p id="percent">0%</p>
</div>

<script>
let width = 0;
let time = 60; // 60 * 100ms = 6 sec

let interval = setInterval(function(){
  width++;
  document.getElementById("bar").style.width = width + "%";
  document.getElementById("percent").innerText = width + "%";

  if(width >= 100){
    clearInterval(interval);

    // 🔥 SMARTLINK REDIRECT
    window.location.href = "https://www.profitablecpmratenetwork.com/wfgse0gu0?key=dfa595cebf5450be98481dd0467d958f";
  }
}, time);
</script>
