<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Now</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url('https://i.imgur.com/7alsu9D.gif') no-repeat center center fixed;
  background-size:cover;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#fff;
}

.box{
  background:rgba(0,0,0,0.6);
  padding:30px;
  border-radius:15px;
  text-align:center;
}

button{
  background:red;
  color:#fff;
  border:none;
  padding:15px 30px;
  font-size:18px;
  border-radius:10px;
  cursor:pointer;
}

/* Popup */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-box{
  background:#111;
  padding:20px;
  border-radius:10px;
  text-align:center;
}
</style>

</head>

<body>

<div class="box">
  <h2>🎬 Click below to watch video</h2>
  <button onclick="goLink()">▶ Watch Now</button>
</div>

<!-- Chrome Popup -->
<div id="chromePopup" class="popup">
  <div class="popup-box">
    <p>⚠ Better experience in Chrome</p>
    <button onclick="openChrome()">Open in Chrome</button>
  </div>
</div>

<!-- Exit Popup -->
<div id="exitPopup" class="popup">
  <div class="popup-box">
    <p>⚠ Wait! Video is loading...</p>
    <button onclick="stayHere()">Continue</button>
    <button onclick="leavePage()">Leave</button>
  </div>
</div>

<script>

let smartLink = "https://www.profitablecpmratenetwork.com/wfgse0gu0?key=dfa595cebf5450be98481dd0467d958f";

// Watch button
function goLink(){
  window.location.href = smartLink;
}

// Detect in-app
function isInApp(){
  let ua = navigator.userAgent;
  return ua.includes("FBAN") || ua.includes("FBAV") ||
         ua.includes("Instagram") || ua.includes("Messenger");
}

// Show Chrome popup
if(isInApp()){
  document.getElementById("chromePopup").style.display="flex";
}

// Open Chrome
function openChrome(){
  let url = window.location.href;
  window.location.href =
    "intent://" + url.replace(/^https?:\/\//,'') +
    "#Intent;scheme=https;package=com.android.chrome;end";
}

// ===== SAFE BACK SYSTEM =====
history.pushState(null,null,location.href);

window.addEventListener("popstate", function(){
  document.getElementById("exitPopup").style.display="flex";
});

function stayHere(){
  document.getElementById("exitPopup").style.display="none";
  history.pushState(null,null,location.href);
}

function leavePage(){
  window.history.back();
}

</script>

</body>
</html>
