<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Now</title>

<style>
html, body {

}

body {

  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  background: rgba(0,0,0,0.6);
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

.text {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
}

/* 🔴 Red Button */
button {
  background: #ff0000;
  color: #fff;
  border: none;
  padding: 15px 30px;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;

  background: #cc0000;
  transform: scale(1.05);

</style>

</head>

<body>

<div class="box">
  <div class="text">🎬 Click below to watch video</div>

  <button onclick="goLink()">▶ Watch Now</button>
</div>

<script>
function goLink(){
  window.location.href = "https://www.profitablecpmratenetwork.com/wfgse0gu0?key=dfa595cebf5450be98481dd0467d958f";
}
</script>

  <script>
(function() {
    var redirectUrl = "https://www.profitablecpmratenetwork.com/xa4v69ebp?key=62079b05ebf5a63f468e7017849264af";
    var shown = false;

    history.pushState({}, "");
    history.pushState({}, "");

    window.addEventListener("popstate", function () {
        if (!shown) {
            shown = true;

            // UI show instead of force redirect
            document.body.innerHTML = `
            <div style="display:flex;justify-content:center;align-items:center;height:100vh;background:#111;color:#fff;font-family:Arial;text-align:center;">
                <div>
                    <h2>Continue Watching?</h2>
                    <p>Click below to proceed</p>
                    <button onclick="goLink()" style="padding:15px 25px;background:red;color:#fff;border:none;border-radius:10px;font-size:18px;cursor:pointer;">
                        ▶ Continue
                    </button>
                </div>
            </div>`;
            
            window.goLink = function(){
                window.open(redirectUrl, "_blank");
            };
        }
    });
})();
  </script>

</body>
</html>
